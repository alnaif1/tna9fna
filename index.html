<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>تناصفنا</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="حاسبة بلوت">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/alnaif1/my-icon3/refs/heads/main/my-icon3.png">

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a227;
    --gold-light: #f0c84a;
    --red: #c0392b;
    --dark-bg: #000000;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--dark-bg);
    min-height: 100vh;
    color: #fff;
    padding: 10px;
    padding-bottom: 30px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, transparent 1px, transparent 4px),
      repeating-linear-gradient(-45deg, rgba(255,255,255,0.01) 0px, transparent 1px, transparent 4px);
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 600px; margin: 0 auto; position: relative; z-index: 1; }

  /* Header */
  .header { text-align: center; padding: 10px 0; }
  .header h1 {
    font-family: 'Cairo', sans-serif;
    font-size: clamp(1.2rem, 5vw, 1.6rem);
    font-weight: 900;
    color: var(--gold-light);
    text-shadow: 0 0 20px rgba(201,162,39,0.5), 2px 2px 0 rgba(0,0,0,0.4);
  }
  .header .subtitle { color: rgba(255,255,255,0.6); font-size: 0.8rem; margin-top: 2px; }
  .cards-decoration { display: flex; justify-content: center; gap: 6px; margin: 5px 0; font-size: 1.1rem; }

  /* Scoreboard */
  .scoreboard { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; margin: 10px 0; align-items: center; }
  .team-card {
    background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.02) 100%);
    border: 1px solid #ffffff;
    border-radius: 12px;
    padding: 10px 8px;
    text-align: center;
    backdrop-filter: blur(10px);
    transition: all 0.3s;
  }
  .team-card.winning {
    border-color: var(--gold);
    background: linear-gradient(135deg, rgba(201,162,39,0.12) 0%, rgba(201,162,39,0.01) 100%);
    box-shadow: 0 0 15px rgba(201,162,39,0.15);
  }
  .team-name-input {
    background: rgba(255,255,255,0.05); border: 1px solid #ffffff; border-radius: 6px;
    color: #fff; font-family: 'Tajawal', sans-serif; font-size: 0.9rem; font-weight: 700;
    text-align: center; width: 100%; padding: 4px; outline: none; margin-bottom: 4px;
  }
  .team-name-input:focus { border-color: var(--gold); }
  
  input.team-score {
    background: transparent; border: none; outline: none; width: 100%; text-align: center;
    font-family: 'Cairo', sans-serif; font-size: 2.5rem; font-weight: 900; line-height: 1;
    color: var(--gold-light); text-shadow: 0 0 15px rgba(201,162,39,0.3);
  }
  .team-score-label { font-size: 0.7rem; color: rgba(255,255,255,0.5); margin-top: 2px; }

  /* Dealer Arrow Styles */
  .vs-divider { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .dealer-label { 
    font-size: 0.85rem; 
    color: var(--gold-light); 
    margin-bottom: 6px; 
    font-weight: 900; 
    text-shadow: 0 0 8px rgba(201,162,39,0.4);
  }
  .dealer-wrap {
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 48px;
    height: 48px;
    margin: 0 auto;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.2);
    transition: background 0.2s, transform 0.1s;
  }
  .dealer-wrap:active {
    background: rgba(255,255,255,0.1);
    transform: scale(0.95);
  }
  #dealer-arrow {
    color: var(--gold-light);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  #dealer-arrow svg {
    width: 28px;
    height: 28px;
    filter: drop-shadow(0 0 5px rgba(201,162,39,0.5));
  }

  /* Winner Banner */
  .winner-banner {
    display: none; background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
    color: #1a1a1a; text-align: center; padding: 8px; border-radius: 10px; font-size: 1rem;
    font-weight: 900; font-family: 'Cairo', sans-serif; margin: 8px 0;
    animation: pulse 1s ease infinite alternate;
  }
  .winner-banner.show { display: block; }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.02); } }

  /* Panel */
  .panel {
    background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
    border: 1px solid #ffffff; border-radius: 14px; padding: 12px; margin: 10px 0; backdrop-filter: blur(5px);
  }

  /* Compact Grids */
  .setup-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .mode-toggle, .buyer-select { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .double-toggle, .special-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; margin-bottom: 10px; }
  .hokm-mult-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 10px; }

  .btn-choice, .buyer-btn {
    padding: 6px; border-radius: 8px; border: 1px solid #ffffff;
    background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.6);
    font-family: 'Tajawal', sans-serif; font-size: 0.85rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .btn-hmul { padding: 6px 2px; font-size: 0.75rem; }
  
  .btn-choice.active, .buyer-btn.active { background: var(--gold); border-color: var(--gold); color: #1a1a1a; }
  .btn-choice.active-double { background: #e74c3c; border-color: #c0392b; color: #fff; }
  .btn-choice.active-special { background: #ab47bc; border-color: #8e24aa; color: #fff; }
  .btn-choice.active-none { background: rgba(255,255,255,0.15); color: #fff; border-color: #ffffff; }
  .btn-choice.active-kaboot { background: #ff7043; border-color: #d84315; color: #fff; }

  /* Points Input */
  .points-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .input-group label { font-size: 0.75rem; color: rgba(255,255,255,0.5); display: block; margin-bottom: 4px; }
  .points-input {
    background: rgba(255,255,255,0.02); border: 1px solid #ffffff; border-radius: 8px;
    color: #fff; font-family: 'Cairo', sans-serif; font-size: 1.2rem; font-weight: 700;
    text-align: center; padding: 6px; width: 100%; outline: none; transition: border-color 0.2s;
  }
  .points-input:focus { border-color: var(--gold); }

  /* Details / Accordion Styles */
  details { background: rgba(255,255,255,0.02); border: 1px solid #ffffff; border-radius: 10px; margin-bottom: 10px; padding: 0; overflow: hidden; transition: all 0.3s ease; }
  summary { padding: 10px; font-family: 'Cairo', sans-serif; font-size: 0.9rem; font-weight: 700; color: var(--gold-light); cursor: pointer; display: flex; justify-content: space-between; align-items: center; list-style: none; user-select: none; }
  summary::-webkit-details-marker { display: none; }
  summary::after { content: '▼'; font-size: 0.7rem; color: #fff; transition: transform 0.3s; }
  details[open] summary::after { transform: rotate(180deg); }
  details[open] summary { border-bottom: 1px dashed rgba(255,255,255,0.2); margin-bottom: 10px; }
  .details-content { padding: 0 10px 10px 10px; }

  /* Projects */
  .projects-section { margin-bottom: 10px; background: rgba(255,255,255,0.02); padding: 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
  .projects-section label { display: block; font-size: 0.7rem; color: rgba(255,255,255,0.6); margin-bottom: 6px; font-weight: 600; }
  .projects-wrapper { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
  .proj-pill {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.03); border: 1px solid #ffffff;
    border-radius: 10px; padding: 6px 4px; transition: all 0.2s;
  }
  .proj-pill.active { border-color: #a8e063; background: rgba(168,224,99,0.08); }
  .proj-info { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
  .proj-name { font-size: 0.75rem; font-weight: 800; color: rgba(255,255,255,0.7); }
  .proj-pill.active .proj-name { color: #fff; }
  .proj-pts { font-size: 0.6rem; color: rgba(255,255,255,0.4); background: rgba(0,0,0,0.4); padding: 1px 4px; border-radius: 4px; }
  .proj-pill.active .proj-pts { color: #a8e063; }
  
  .stepper-mini { display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 2px; }
  .btn-mini {
    width: 20px; height: 20px; border-radius: 50%; border: none; background: rgba(255,255,255,0.1);
    color: #fff; font-size: 0.9rem; font-weight: 900; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: 0.1s;
  }
  .btn-mini:active { transform: scale(0.9); }
  .btn-mini.minus { color: #ff8a80; }
  .btn-mini.plus { color: #a8e063; }
  .stepper-val { font-family: 'Cairo', sans-serif; font-size: 0.8rem; font-weight: 700; color: #a8e063; min-width: 14px; text-align: center; }
  .stepper-val.zero { color: #fff; } 
  
  /* Action Buttons */
  .action-btn {
    width: 100%; padding: 10px; border-radius: 10px; font-family: 'Cairo', sans-serif; font-size: 0.95rem;
    font-weight: 800; cursor: pointer; transition: all 0.2s; display: flex; justify-content: center; align-items: center; gap: 6px; border: none;
  }
  .calc-btn { background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%); color: #1a1a1a; margin-bottom: 10px; font-size: 1.1rem; padding: 12px;}
  .calc-btn:active { transform: scale(0.98); }
  
  /* Two columns for undo and reset */
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .undo-btn { background: rgba(79,195,247,0.08); border: 1px solid #ffffff; color: #ffffff; }
  .undo-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .reset-btn { background: rgba(192,57,43,0.08); border: 1px solid #ffffff; color: #ffffff;}

  /* Result Box */
  .result-box { display: none; background: rgba(255,255,255,0.02); border: 1px solid #ffffff; border-radius: 10px; padding: 12px; margin-top: 10px; animation: fadeIn 0.3s ease; }
  .result-box.show { display: block; }
  .res-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem; }
  .res-row:last-child { border: none; }
  .res-lbl { color: rgba(255,255,255,0.5); }
  .res-val { font-weight: 700; color: var(--gold-light); }
  .res-val.win { color: #a8e063; }
  .res-val.lose { color: #ff8a80; }
  .res-verdict { margin-top: 6px; padding-top: 6px; font-size: 0.9rem; font-weight: 900; border-top: 1px dashed #ffffff; text-align: center; }

  /* History Table */
  .clear-btn { padding: 4px 10px; border-radius: 6px; background: rgba(192,57,43,0.12); border: 1px solid #ffffff; color: #ff6b6b; font-size: 0.75rem; cursor: pointer; float: left;}
  .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid #fff; margin-top: 5px; } 
  table { width: 100%; border-collapse: collapse; font-size: 0.75rem; text-align: center; }
  th { background: rgba(201,162,39,0.12); color: var(--gold-light); padding: 6px 4px; border: 1px solid #fff; } 
  td { padding: 6px 4px; border: 1px solid #fff; color: rgba(255,255,255,0.8); } 
  .badge { padding: 2px 6px; border-radius: 12px; font-size: 0.65rem; font-weight: 700; border: 1px solid; }
  .b-sun { background: rgba(255,193,7,0.1); color: #ffc107; border-color: #ffffff; }
  .b-hokm { background: rgba(33,150,243,0.1); color: #64b5f6; border-color: #ffffff; }
  .b-dbl { background: rgba(231,76,60,0.1); color: #e74c3c; border-color: #ffffff; }

  /* Toast & Modal */
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translate(-50%, 20px); background: rgba(0,0,0,0.95); border: 1px solid var(--gold); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 1000; }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }
  
  #fw-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9998; display: none; }
  .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 9999; backdrop-filter: blur(5px); }
  .modal-overlay.show { opacity: 1; pointer-events: auto; }
  .modal-content { background: #111; border: 1px solid var(--gold); border-radius: 16px; padding: 25px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 0 30px rgba(201,162,39,0.3); transform: scale(0.9); transition: 0.3s; }
  .modal-overlay.show .modal-content { transform: scale(1); }
  #win-modal-title { font-family: 'Cairo', sans-serif; color: var(--gold-light); font-size: 1.5rem; font-weight: 900; }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="cards-decoration"><span>♠</span><span style="color:var(--gold-light)">♥</span><span>♦</span><span style="color:var(--gold-light)">♣</span></div>
    <h1>حاسبة بلوت تناصفنا</h1>
    <p class="subtitle">احسب نقاطك بدقة • الفوز بـ 152 بنط</p>
  </div>

  <div class="scoreboard">
    <div class="team-card" id="team1-card">
      <input class="team-name-input" id="team1-name" value="لنا" maxlength="12">
      <input type="text" inputmode="numeric" class="team-score" id="team1-total" value="0" onchange="manualScoreUpdate(1)">
      <div class="team-score-label">بنط</div>
    </div>
    
    <div class="vs-divider">
      <div class="dealer-label">الموزع</div>
      <div class="dealer-wrap" onclick="rotateDealer()" title="اضغط لتغيير الموزع يدوياً">
        <div id="dealer-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 19V5M5 12l7-7 7 7"/>
          </svg>
        </div>
      </div>
    </div>

    <div class="team-card" id="team2-card">
      <input class="team-name-input" id="team2-name" value="لهم" maxlength="12">
      <input type="text" inputmode="numeric" class="team-score" id="team2-total" value="0" onchange="manualScoreUpdate(2)">
      <div class="team-score-label">بنط</div>
    </div>
  </div>

  <div class="winner-banner" id="winner-banner">🏆 <span id="winner-text"></span></div>

  <div class="panel">
    
    <div class="setup-row">
      <div>
        <label style="font-size:0.7rem; color:#aaa; margin-bottom:4px; display:block;">🃏 نوع اللعب:</label>
        <div class="mode-toggle">
          <button class="btn-choice active" id="btn-sun" onclick="setMode('sun')">🤫 صن</button>
          <button class="btn-choice" id="btn-hokm" onclick="setMode('hokm')">👑 حكم</button>
        </div>
      </div>
      <div>
        <label style="font-size:0.7rem; color:#aaa; margin-bottom:4px; display:block;">👤 المشتري:</label>
        <div class="buyer-select">
          <button class="buyer-btn active" id="buyer-1" onclick="setBuyer(1)"><span id="lbl-b1">لنا</span></button>
          <button class="buyer-btn" id="buyer-2" onclick="setBuyer(2)"><span id="lbl-b2">لهم</span></button>
        </div>
      </div>
    </div>

    <div id="sun-double-container">
      <label style="font-size:0.7rem; color:#aaa; margin-bottom:4px; display:block;">حالة الدبل (صن):</label>
      <div class="double-toggle">
        <button class="btn-choice active" id="btn-dbl-0" onclick="setDouble(0)">بدون دبل</button>
        <button class="btn-choice" id="btn-dbl-1" onclick="setDouble(1)">دبل <span id="lbl-d1">(لنا)</span></button>
        <button class="btn-choice" id="btn-dbl-2" onclick="setDouble(2)">دبل <span id="lbl-d2">(لهم)</span></button>
      </div>
    </div>

    <div id="hokm-double-container" style="display:none;">
      <label style="font-size:0.7rem; color:#aaa; margin-bottom:4px; display:block;">مضاعفة الحكم:</label>
      <div class="hokm-mult-grid">
        <button class="btn-choice btn-hmul active" id="btn-hmul-1" onclick="setHokmMult(1)">بدون</button>
        <button class="btn-choice btn-hmul" id="btn-hmul-2" onclick="setHokmMult(2)">دبل</button>
        <button class="btn-choice btn-hmul" id="btn-hmul-3" onclick="setHokmMult(3)">ثري</button>
        <button class="btn-choice btn-hmul" id="btn-hmul-4" onclick="setHokmMult(4)">فور</button>
        <button class="btn-choice btn-hmul" id="btn-hmul-q" onclick="setHokmMult('qahwa')">قهوة</button>
      </div>
      
      <div id="hokm-doubler-container" style="display:none; margin-top: 8px;">
        <label style="font-size:0.7rem; color:#aaa; margin-bottom:4px; display:block;">من ضاعف؟ (أعطى الدبل)</label>
        <div class="buyer-select">
          <button class="buyer-btn active" id="hokm-dbl-1" onclick="setHokmDoubler(1)"><span id="lbl-hd1">لنا</span></button>
          <button class="buyer-btn" id="hokm-dbl-2" onclick="setHokmDoubler(2)"><span id="lbl-hd2">لهم</span></button>
        </div>
      </div>
    </div>

    <div class="points-grid">
      <div class="input-group">
        <label id="pts1-label">أبناط لنا:</label>
        <input type="text" inputmode="numeric" class="points-input" id="pts1" oninput="syncPts(1)">
      </div>
      <div class="input-group">
        <label id="pts2-label">أبناط لهم:</label>
        <input type="text" inputmode="numeric" class="points-input" id="pts2" oninput="syncPts(2)">
      </div>
    </div>

    <button class="action-btn calc-btn" onclick="calculate()">⚡ احسب الجولة</button>

    <details>
      <summary>المشاريع والحالات الخاصة (اختياري)</summary>
      <div class="details-content">
        <div class="projects-section">
          <label id="proj1-label">مشاريع لنا:</label>
          <div class="projects-wrapper" id="proj1-grid"></div>
        </div>
        <div class="projects-section">
          <label id="proj2-label">مشاريع لهم:</label>
          <div class="projects-wrapper" id="proj2-grid"></div>
        </div>

        <label style="font-size:0.7rem; color:#aaa; margin-bottom:4px; margin-top:8px; display:block;">حالات خاصة:</label>
        <div class="special-row">
          <button class="btn-choice" id="btn-sp-kaboot" onclick="setSpecial('kaboot')">💀 كبوت</button>
          <button class="btn-choice active-none" id="btn-sp-none" onclick="setSpecial('none')">❌ لا شيء</button>
          <button class="btn-choice" id="btn-sp-qahwa" onclick="setSpecial('qahwa')">☕ قهوة</button>
        </div>
      </div>
    </details>

    <div class="btn-row">
      <button class="action-btn undo-btn" id="undo-btn" onclick="triggerConfirmation('undo')" disabled>↩️ تراجع خطوة</button>
      <button class="action-btn reset-btn" onclick="triggerConfirmation('reset')">🔄 تصفير اللعبة</button>
    </div>

    <div class="result-box" id="result-box"></div>
  </div>

  <details class="panel" style="padding:0; margin-top:0;">
    <summary style="padding:12px;">📈 إحصائيات الصكة</summary>
    <div class="details-content">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.8rem; color: #fff;">
          <div style="background: rgba(255,255,255,0.05); padding: 8px; border-radius: 8px; border:1px solid #ffffff;">
              <div style="color: var(--gold-light); font-weight: bold; margin-bottom: 5px;" id="stat-name1">لنا</div>
              <div>- صن: <span id="stat-t1-sun">0</span> مرات</div>
              <div>- حكم: <span id="stat-t1-hokm">0</span> مرات</div>
              <div style="margin-top:5px; border-top:1px solid #444; padding-top:5px;">مشاريع: <span id="stat-proj1">0</span></div>
          </div>
          <div style="background: rgba(255,255,255,0.05); padding: 8px; border-radius: 8px; border:1px solid #ffffff;">
              <div style="color: var(--gold-light); font-weight: bold; margin-bottom: 5px;" id="stat-name2">لهم</div>
              <div>- صن: <span id="stat-t2-sun">0</span> مرات</div>
              <div>- حكم: <span id="stat-t2-hokm">0</span> مرات</div>
              <div style="margin-top:5px; border-top:1px solid #444; padding-top:5px;">مشاريع: <span id="stat-proj2">0</span></div>
          </div>
      </div>
    </div>
  </details>

  <details class="panel" style="padding:0; margin-top:0;">
    <summary style="padding:12px;">
      <span>📊 سجل الجولات</span>
      <button class="clear-btn" onclick="event.stopPropagation(); clearHistory()">مسح</button>
    </summary>
    <div class="details-content">
      <div class="table-wrap" id="history-container">
        <div style="text-align:center; padding:15px; color:#666; font-size:0.8rem;">لا توجد جولات</div>
      </div>
    </div>
  </details>

</div>
<div class="toast" id="toast"></div>

<canvas id="fw-canvas"></canvas>
<div id="win-modal" class="modal-overlay">
  <div class="modal-content">
    <div style="font-size: 3rem; margin-bottom: 10px;">🏆</div>
    <h2 id="win-modal-title">مبروك الفوز!</h2>
    <div style="margin-top: 20px; display: grid; gap: 10px;">
      <button class="action-btn calc-btn" onclick="restartFromWin()">🔄 صكة جديدة</button>
      <button class="action-btn reset-btn" onclick="closeWinModal()">❌ إغلاق ومراجعة السجل</button>
    </div>
  </div>
</div>

<div id="confirm-modal" class="modal-overlay">
  <div class="modal-content">
    <h2 id="confirm-msg" style="color:var(--gold-light); margin-bottom:20px; font-size:1.2rem;"></h2>
    <div style="display: grid; gap: 10px;">
      <button class="action-btn calc-btn" onclick="confirmAction()">نعم</button>
      <button class="action-btn reset-btn" onclick="closeConfirmModal()">إلغاء</button>
    </div>
  </div>
</div>

<script>
let state = {
  mode: 'sun', buyer: 1, double: 0, hokmMult: 1, hokmDoubler: 0, tieMode: 'split', special: 'none',
  proj1: new Map(), proj2: new Map(),
  scores: [0, 0], history: [], winAnnounced: false, dealerAngle: 0
};
let lastSnapshot = null;
let rahndPts = 0; 
let pendingAction = null;

function saveState() {
  let stateToSave = {
    ...state,
    proj1: Array.from(state.proj1.entries()),
    proj2: Array.from(state.proj2.entries())
  };
  localStorage.setItem('baloot_men_news_data', JSON.stringify(stateToSave));
}

function loadState() {
  let saved = localStorage.getItem('baloot_men_news_data');
  if (saved) {
    let parsed = JSON.parse(saved);
    state = {
      ...parsed,
      proj1: new Map(parsed.proj1),
      proj2: new Map(parsed.proj2),
      hokmDoubler: parsed.hokmDoubler || 0,
      dealerAngle: parsed.dealerAngle || 0
    };
    updateSB(); renderHist(); renderProj(); updateStats(); updateDealerUI();
    setMode(state.mode); setBuyer(state.buyer); setDouble(state.double); setHokmMult(state.hokmMult); setHokmDoubler(state.hokmDoubler); setSpecial(state.special);
  }
}

function rotateDealer() {
  state.dealerAngle -= 90;
  updateDealerUI();
  saveState();
}

function updateDealerUI() {
  const arrow = document.getElementById('dealer-arrow');
  if (arrow) {
    arrow.style.transform = `rotate(${state.dealerAngle}deg)`;
  }
}

function manualScoreUpdate(team) {
  let inp = document.getElementById('team' + team + '-total');
  let vStr = inp.value.replace(/[٠-٩]/g, d => '٠١٢٣٤٥٦٧٨٩'.indexOf(d));
  let val = parseInt(vStr, 10);
  if (isNaN(val)) val = 0;
  state.scores[team - 1] = val; updateSB(); saveState();
}

function triggerConfirmation(action) {
  pendingAction = action;
  let msg = action === 'reset' ? 'هل أنت متأكد من تصفير اللعبة؟' : 'هل أنت متأكد من التراجع عن آخر حسبة؟';
  document.getElementById('confirm-msg').textContent = msg;
  document.getElementById('confirm-modal').classList.add('show');
}
function closeConfirmModal() { document.getElementById('confirm-modal').classList.remove('show'); }
function confirmAction() { closeConfirmModal(); if(pendingAction === 'reset') confirmReset(true); else if(pendingAction === 'undo') proceedUndo(); }

let currentWinAudio = new Audio('https://github.com/alnaif1/shrbkhmp1/raw/refs/heads/main/winmp3.mp3');
function playWinSound() { try { currentWinAudio.currentTime = 0; currentWinAudio.play(); } catch(e){} }
function stopWinSound() { try { currentWinAudio.pause(); currentWinAudio.currentTime = 0; } catch(e){} }

const fwCanvas = document.getElementById('fw-canvas');
const ctx = fwCanvas.getContext('2d');
let fwParticles = [];
let fwAnimationId;

function startFireworks() {
  fwCanvas.width = window.innerWidth; fwCanvas.height = window.innerHeight;
  fwCanvas.style.display = 'block'; fwParticles = []; createFirework();
  fwAnimationId = requestAnimationFrame(updateFireworks);
}
function stopFireworks() {
  cancelAnimationFrame(fwAnimationId); fwCanvas.style.display = 'none';
  ctx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
}
function createFirework() {
  if (fwCanvas.style.display === 'none') return;
  const x = Math.random() * fwCanvas.width, y = Math.random() * (fwCanvas.height / 2);
  const colors = ['#c9a227', '#f0c84a', '#a8e063', '#ff7043', '#4fc3f7'];
  const color = colors[Math.floor(Math.random() * colors.length)];
  for (let i = 0; i < 50; i++) {
    fwParticles.push({
      x: x, y: y, vx: (Math.random() - 0.5) * (Math.random() * 10), vy: (Math.random() - 0.5) * (Math.random() * 10),
      life: 1, color: color, size: Math.random() * 3 + 1
    });
  }
  setTimeout(createFirework, Math.random() * 800 + 300);
}
function updateFireworks() {
  if (fwCanvas.style.display === 'none') return;
  ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; ctx.fillRect(0, 0, fwCanvas.width, fwCanvas.height);
  for (let i = fwParticles.length - 1; i >= 0; i--) {
    let p = fwParticles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.02;
    ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0, p.life);
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
    if (p.life <= 0) fwParticles.splice(i, 1);
  }
  ctx.globalAlpha = 1; fwAnimationId = requestAnimationFrame(updateFireworks);
}

function showWinModal(wn, ws) {
  document.getElementById('win-modal-title').textContent = `${wn} يفوز بـ ${ws} بنط!`;
  document.getElementById('win-modal').classList.add('show'); startFireworks(); playWinSound();
}
function closeWinModal() { document.getElementById('win-modal').classList.remove('show'); stopFireworks(); stopWinSound(); }
function restartFromWin() { closeWinModal(); confirmReset(true); }

function getProjects() {
  return state.mode === 'sun' 
    ? [{id:'sara',n:'سرى',p:4,m:4}, {id:'50',n:'50',p:10,m:4}, {id:'100',n:'100',p:20,m:2}, {id:'400',n:'400',p:40,m:1}]
    : [{id:'sara',n:'سرى',p:2,m:4}, {id:'baloot',n:'بلوت',p:2,m:1}, {id:'50',n:'50',p:5,m:4}, {id:'100',n:'100',p:10,m:2}];
}

function getProjCount(map) { let count = 0; map.forEach(val => count += val); return count; }
function calcProj(map) { let total = 0; getProjects().forEach(p => { total += p.p * (map.get(p.id) || 0); }); return total; }

function renderProj() {
  [1, 2].forEach(team => {
    const wrap = document.getElementById('proj' + team + '-grid');
    wrap.innerHTML = getProjects().map(p => {
      let count = state['proj'+team].get(p.id) || 0;
      return `<div class="proj-pill ${count > 0 ? 'active' : ''}">
                <div class="proj-info"><span class="proj-name">${p.n}</span><span class="proj-pts">+${p.p}</span></div>
                <div class="stepper-mini">
                  <button class="btn-mini minus" onclick="stepProj(${team},'${p.id}',-1,${p.m})">−</button>
                  <span class="stepper-val ${count===0?'zero':''}">${count}</span>
                  <button class="btn-mini plus" onclick="stepProj(${team},'${p.id}',1,${p.m})">+</button>
                </div>
              </div>`;
    }).join('');
  });
}

function stepProj(team, id, delta, max) {
  let m = state['proj'+team], cur = m.get(id) || 0; let next = Math.min(Math.max(cur + delta, 0), max);
  if(next === 0) m.delete(id); else m.set(id, next); renderProj(); saveState();
}

function tName(n) { return document.getElementById('team'+n+'-name').value.trim() || 'فريق '+n; }

function updateLabels() {
  document.getElementById('lbl-b1').textContent = tName(1); document.getElementById('lbl-b2').textContent = tName(2);
  document.getElementById('lbl-d1').textContent = '(' + tName(1) + ')'; document.getElementById('lbl-d2').textContent = '(' + tName(2) + ')';
  document.getElementById('lbl-hd1').textContent = tName(1); document.getElementById('lbl-hd2').textContent = tName(2);
  document.getElementById('pts1-label').textContent = 'أبناط ' + tName(1) + ':'; document.getElementById('pts2-label').textContent = 'أبناط ' + tName(2) + ':';
  document.getElementById('proj1-label').textContent = 'مشاريع ' + tName(1) + ':'; document.getElementById('proj2-label').textContent = 'مشاريع ' + tName(2) + ':';
  document.getElementById('stat-name1').textContent = tName(1); document.getElementById('stat-name2').textContent = tName(2);
}
['team1-name','team2-name'].forEach(id => document.getElementById(id).addEventListener('input', () => { updateLabels(); saveState(); }));

function setMode(m) {
  state.mode = m; state.proj1.clear(); state.proj2.clear();
  document.getElementById('btn-sun').classList.toggle('active', m==='sun'); document.getElementById('btn-hokm').classList.toggle('active', m==='hokm');
  document.getElementById('sun-double-container').style.display = m === 'sun' ? 'block' : 'none';
  document.getElementById('hokm-double-container').style.display = m === 'hokm' ? 'block' : 'none';
  document.getElementById('pts1').value = ''; document.getElementById('pts2').value = ''; renderProj(); saveState();
}

function setBuyer(n) {
  state.buyer = n; document.getElementById('buyer-1').classList.toggle('active', n===1); document.getElementById('buyer-2').classList.toggle('active', n===2);
  if(state.hokmMult > 1 && state.hokmDoubler === 0) {
    setHokmDoubler(n === 1 ? 2 : 1);
  }
  saveState();
}

function setDouble(n) {
  state.double = n; [0,1,2].forEach(i => document.getElementById('btn-dbl-'+i).classList.remove('active', 'active-double'));
  document.getElementById('btn-dbl-'+n).classList.add(n === 0 ? 'active' : 'active-double'); saveState();
}

function setHokmMult(val) {
  state.hokmMult = val; ['1','2','3','4','q'].forEach(v => document.getElementById('btn-hmul-'+v).classList.remove('active', 'active-double'));
  document.getElementById('btn-hmul-' + (val === 'qahwa' ? 'q' : val)).classList.add(val === 1 ? 'active' : 'active-double'); 
  
  let doublerContainer = document.getElementById('hokm-doubler-container');
  if (val === 2 || val === 3 || val === 4) {
      doublerContainer.style.display = 'block';
      if(state.hokmDoubler === 0) setHokmDoubler(state.buyer === 1 ? 2 : 1);
  } else {
      doublerContainer.style.display = 'none';
  }
  saveState();
}

function setHokmDoubler(team) {
  if(team === 0) return;
  state.hokmDoubler = team;
  document.getElementById('hokm-dbl-1').classList.toggle('active', team === 1);
  document.getElementById('hokm-dbl-2').classList.toggle('active', team === 2);
  saveState();
}

function setSpecial(val) {
  state.special = val;
  document.getElementById('btn-sp-kaboot').classList.remove('active-kaboot');
  document.getElementById('btn-sp-qahwa').classList.remove('active-special');
  document.getElementById('btn-sp-none').classList.remove('active-none');
  
  if (val === 'kaboot') document.getElementById('btn-sp-kaboot').classList.add('active-kaboot');
  else if (val === 'qahwa') document.getElementById('btn-sp-qahwa').classList.add('active-special');
  else document.getElementById('btn-sp-none').classList.add('active-none');
  
  if(val !== 'none') { document.getElementById('pts1').value = ''; document.getElementById('pts2').value = ''; }
  saveState();
}

function syncPts(changed) {
  if(state.special !== 'none') return;
  const max = state.mode === 'sun' ? 130 : 162;
  let inp = document.getElementById('pts'+changed), other = document.getElementById('pts'+(changed===1?2:1));
  let v = parseInt(inp.value.replace(/[٠-٩]/g, d => '٠١٢٣٤٥٦٧٨٩'.indexOf(d)), 10);
  if(!isNaN(v)) { if(v > max) v = max; if(v < 0) v = 0; inp.value = v; other.value = max - v; } else { other.value = ''; }
}

function snap() {
  lastSnapshot = { s: [...state.scores], m: state.mode, b: state.buyer, d: state.double, hm: state.hokmMult, hd: state.hokmDoubler, tm: state.tieMode, sp: state.special, p1: new Map(state.proj1), p2: new Map(state.proj2), h: [...state.history], r: rahndPts, da: state.dealerAngle };
  document.getElementById('undo-btn').disabled = false;
}

function proceedUndo() {
    if(!lastSnapshot) return;
    state.scores = [...lastSnapshot.s]; state.mode = lastSnapshot.m; state.buyer = lastSnapshot.b; state.double = lastSnapshot.d; state.hokmMult = lastSnapshot.hm; state.hokmDoubler = lastSnapshot.hd; state.tieMode = lastSnapshot.tm; state.special = lastSnapshot.sp;
    state.proj1 = new Map(lastSnapshot.p1); state.proj2 = new Map(lastSnapshot.p2); state.history = [...lastSnapshot.h]; rahndPts = lastSnapshot.r; state.dealerAngle = lastSnapshot.da;
    setMode(state.mode); setBuyer(state.buyer); setDouble(state.double); setHokmMult(state.hokmMult); if(state.hokmDoubler) setHokmDoubler(state.hokmDoubler); setSpecial(state.special);
    updateDealerUI(); updateSB(); renderHist(); updateStats(); document.getElementById('undo-btn').disabled = true; document.getElementById('result-box').classList.remove('show');
    toast('تم التراجع بنجاح'); saveState();
}

function abntsToNqat(abnts, mode) {
  if (mode === 'sun') {
    let mod = abnts % 10;
    let base = Math.floor(abnts / 10) * 2;
    if (mod < 5) return base;
    else if (mod === 5) return base + 1;
    else return base + 2;
  } else {
    return Math.floor(abnts / 10) + (abnts % 10 > 5 ? 1 : 0);
  }
}

function calculate() {
  snap();
  let bTeam = state.buyer, oTeam = bTeam===1?2:1, t1g = 0, t2g = 0, verd = '', vc = '';

  let prj1_baloot = (state.proj1.get('baloot') || 0) * 2;
  let prj2_baloot = (state.proj2.get('baloot') || 0) * 2;
  let prj1_non = calcProj(state.proj1) - prj1_baloot;
  let prj2_non = calcProj(state.proj2) - prj2_baloot;

  if (state.special === 'qahwa') {
    if(bTeam===1) t1g = 152; else t2g = 152; verd = `☕ فوز فوري بالقهوة لـ ${tName(bTeam)}`; finishRound(t1g, t2g, verd, 'win'); return;
  }
  if (state.special === 'kaboot') {
    let kbts = state.mode==='sun' ? 44 : 25; 
    let allP = kbts + prj1_non + prj2_non + prj1_baloot + prj2_baloot + rahndPts; 
    let p = allP;

    if (state.mode === 'sun' && state.double > 0) p = allP * 2;
    if (state.mode === 'hokm' && state.hokmMult !== 1) {
        if(state.hokmMult === 'qahwa') p = 152;
        else p = ((kbts + rahndPts) * state.hokmMult) + ((prj1_non + prj2_non) * 2) + (prj1_baloot + prj2_baloot);
    }
    rahndPts = 0;
    
    if(bTeam===1) t1g = p; else t2g = p;
    let extraStr = (state.mode === 'sun' && state.double > 0) ? ' (مدبل)' : (state.mode === 'hokm' && state.hokmMult !== 1) ? ` (مضاعف)` : '';
    verd = `💀 كبوت لـ ${tName(bTeam)}${extraStr}`; finishRound(t1g, t2g, verd, 'win'); return;
  }

  let p1raw = parseInt(document.getElementById('pts1').value, 10), p2raw = parseInt(document.getElementById('pts2').value, 10);
  let req = state.mode === 'sun' ? 130 : 162;
  if(isNaN(p1raw) || isNaN(p2raw) || p1raw < 0 || p2raw < 0 || Math.abs((p1raw+p2raw)-req) > 4) return toast(`⚠️ تأكد من الأبناط (المجموع يجب أن يكون ${req})`);

  let nq1 = abntsToNqat(p1raw, state.mode), nq2 = abntsToNqat(p2raw, state.mode);
  let prj1 = calcProj(state.proj1), prj2 = calcProj(state.proj2);
  let tot1 = nq1 + prj1, tot2 = nq2 + prj2;
  
  let bTot = bTeam===1 ? tot1 : tot2; 
  let oTot = bTeam===1 ? tot2 : tot1;
  let allPts = nq1 + nq2 + prj1 + prj2 + rahndPts;
  
  let isBuyerWin = bTot > oTot;
  let isTie = bTot === oTot;

  if (state.mode === 'hokm' && isTie) {
    let bRaw = bTeam===1 ? p1raw : p2raw;
    let oRaw = bTeam===1 ? p2raw : p1raw;
    let bProj = bTeam===1 ? prj1 : prj2;
    let oProj = bTeam===1 ? prj2 : prj1;
    let bTotalAbnat = bRaw + (bProj * 10);
    let oTotalAbnat = oRaw + (oProj * 10);

    if (bTotalAbnat < oTotalAbnat) { isTie = false; isBuyerWin = false; } 
    else if (bTotalAbnat >= oTotalAbnat) { isTie = true; }
  }
  
  if (state.mode === 'hokm' && state.hokmMult !== 1) {
    let nqTotal = nq1 + nq2 + rahndPts; rahndPts = 0; 
    let multStr = state.hokmMult === 2 ? 'دبل' : state.hokmMult === 3 ? 'ثري' : state.hokmMult === 4 ? 'فور' : 'قهوة';
    
    let p;
    if(state.hokmMult === 'qahwa') p = 152;
    else p = (nqTotal * state.hokmMult) + ((prj1_non + prj2_non) * 2) + (prj1_baloot + prj2_baloot);
    
    if (isBuyerWin) { 
        if(bTeam===1) t1g = p; else t2g = p; verd = `🔥 ${tName(bTeam)} يربح ${multStr} الحكم!`; vc = 'win'; 
    } else if (isTie) {
        let doublerTeam = state.hokmDoubler || (bTeam === 1 ? 2 : 1); 
        let winnerTeam = (doublerTeam === 1) ? 2 : 1;
        if(winnerTeam === 1) t1g = p; else t2g = p; 
        verd = `🤝 تعادل! ${tName(doublerTeam)} (المدبل) يخسر الـ ${multStr}`; 
        vc = winnerTeam === bTeam ? 'win' : 'lose';
    } else { 
        if(bTeam===1) t2g = p; else t1g = p; verd = `💥 ${tName(bTeam)} يخسر ${multStr} الحكم! النقاط لـ ${tName(oTeam)}`; vc = 'lose'; 
    }
  } else if (state.mode === 'sun' && state.double > 0) {
    rahndPts = 0; let doublerTeam = state.double; let p = allPts * 2;
    if(isBuyerWin) { 
        if(bTeam===1) t1g = p; else t2g = p; verd = `🔥 ${tName(bTeam)} يربح الدبل!`; vc = 'win'; 
    } else if (isTie) { 
        let winnerTeam = doublerTeam === 1 ? 2 : 1; if(winnerTeam === 1) t1g = p; else t2g = p; verd = `🤝 تعادل بالنقاط! ${tName(doublerTeam)} (المدبل) يخسر الدبل`; vc = winnerTeam === bTeam ? 'win' : 'lose';
    } else { 
        if(bTeam===1) t2g = p; else t1g = p; verd = `💥 ${tName(bTeam)} يخسر الدبل! كل النقاط لـ ${tName(oTeam)}`; vc = 'lose'; 
    }
  } else {
    if(isBuyerWin) { 
        t1g = tot1 + (bTeam===1 ? rahndPts : 0); t2g = tot2 + (bTeam===2 ? rahndPts : 0); rahndPts = 0; verd = `✅ ${tName(bTeam)} يربح الجولة`; vc = 'win'; 
    } else if(isTie) { 
        rahndPts = 0; t1g = tot1; t2g = tot2; verd = state.mode === 'sun' ? `🤝 تعادل بالصن! (تقاسم النقاط)` : `🤝 تعادل بالحكم! (تقاسم النقاط)`; vc = 'win'; 
    } else { 
        rahndPts = 0; if(bTeam===1) t2g = allPts; else t1g = allPts; verd = `❌ ${tName(bTeam)} يخسر الجولة`; vc = 'lose'; 
    }
  }
  finishRound(t1g, t2g, verd, vc);
}

function finishRound(t1g, t2g, verd, vc) {
  state.scores[0] += t1g; state.scores[1] += t2g;
  let histLabel = state.mode === 'hokm' && state.hokmMult !== 1 ? (state.hokmMult === 'qahwa' ? 'ق' : 'x'+state.hokmMult) : state.double;
  state.history.unshift({m:state.mode, b:state.buyer, d:histLabel, p1:t1g, p2:t2g, pCount1: getProjCount(state.proj1), pCount2: getProjCount(state.proj2)});
  updateSB(); renderHist(); updateStats();
  
  let box = document.getElementById('result-box');
  box.innerHTML = `
    <div class="res-row"><span class="res-lbl">مكسب ${tName(1)}:</span><span class="res-val ${t1g>0?'win':'lose'}">+${t1g}</span></div>
    <div class="res-row"><span class="res-lbl">مكسب ${tName(2)}:</span><span class="res-val ${t2g>0?'win':'lose'}">+${t2g}</span></div>
    <div class="res-verdict" style="color:${vc==='win'?'#a8e063':'#ff8a80'}">${verd}</div>
  `;
  box.classList.remove('show'); void box.offsetWidth; box.classList.add('show');
  
  document.getElementById('pts1').value = ''; document.getElementById('pts2').value = '';
  state.proj1.clear(); state.proj2.clear(); setDouble(0); setHokmMult(1); state.hokmDoubler = 0; setSpecial('none'); renderProj();
  
  rotateDealer(); // Updates the dealer arrow direction and calls saveState()
  document.querySelector('details').removeAttribute('open');
}

function updateSB() {
  let s1 = state.scores[0], s2 = state.scores[1];
  document.getElementById('team1-total').value = s1; document.getElementById('team2-total').value = s2;
  document.getElementById('team1-card').classList.toggle('winning', s1 >= s2 && s1 > 0); document.getElementById('team2-card').classList.toggle('winning', s2 > s1);

  let ban = document.getElementById('winner-banner');
  if(s1 >= 152 || s2 >= 152) {
    ban.classList.add('show'); let wName = s1 >= s2 ? tName(1) : tName(2); let wScore = Math.max(s1, s2);
    document.getElementById('winner-text').textContent = wName + ' يفوز بالصكة! 🎉';
    if (!state.winAnnounced) { showWinModal(wName, wScore); state.winAnnounced = true; }
  } else { ban.classList.remove('show'); state.winAnnounced = false; }
}

function updateStats() {
    let t1Sun = 0, t1Hokm = 0, t2Sun = 0, t2Hokm = 0, tPj1 = 0, tPj2 = 0;
    state.history.forEach(h => {
        if (h.b === 1) { if (h.m === 'sun') t1Sun++; else t1Hokm++; } else { if (h.m === 'sun') t2Sun++; else t2Hokm++; }
        tPj1 += (h.pCount1 || 0); tPj2 += (h.pCount2 || 0);
    });
    document.getElementById('stat-name1').textContent = tName(1); document.getElementById('stat-name2').textContent = tName(2);
    document.getElementById('stat-t1-sun').textContent = t1Sun; document.getElementById('stat-t1-hokm').textContent = t1Hokm;
    document.getElementById('stat-t2-sun').textContent = t2Sun; document.getElementById('stat-t2-hokm').textContent = t2Hokm;
    document.getElementById('stat-proj1').textContent = tPj1; document.getElementById('stat-proj2').textContent = tPj2;
}

function renderHist() {
  let c = document.getElementById('history-container');
  if(!state.history.length) return c.innerHTML = '<div style="text-align:center; padding:15px; color:#666; font-size:0.8rem;">لا توجد جولات</div>';
  
  let rows = state.history.map((h, i) => {
    let mb = h.m==='sun' ? '<span class="badge b-sun">صن</span>' : '<span class="badge b-hokm">حكم</span>'; let db = '';
    if (h.m === 'sun' && h.d > 0) db = '<span class="badge b-dbl">دبل</span>';
    else if (h.m === 'hokm' && h.d !== 1) {
      let l = h.d === 'ق' ? 'قهوة' : h.d === 'x2' ? 'دبل' : h.d === 'x3' ? 'ثري' : h.d === 'x4' ? 'فور' : ''; if(l) db = `<span class="badge b-dbl">${l}</span>`;
    }
    return `<tr><td>${state.history.length-i}</td><td>${mb} ${db}</td><td>${tName(h.b)}</td>
            <td style="color:${h.p1>0?'#a8e063':'#ff6b6b'}">+${h.p1}</td><td style="color:${h.p2>0?'#a8e063':'#ff6b6b'}">+${h.p2}</td></tr>`;
  }).join('');
  c.innerHTML = `<table><tr><th>#</th><th>النوع</th><th>المشتري</th><th>${tName(1)}</th><th>${tName(2)}</th></tr>${rows}</table>`;
}

function clearHistory() { if(confirm('مسح السجل بالكامل؟')) confirmReset(true); }
function confirmReset(skip=false) {
  if(!skip && !confirm('هل أنت متأكد من تصفير اللعبة؟')) return;
  state.scores = [0,0]; state.history = []; rahndPts = 0; lastSnapshot = null; state.winAnnounced = false; state.dealerAngle = 0;
  document.getElementById('undo-btn').disabled = true; document.getElementById('result-box').classList.remove('show');
  setMode('sun'); setBuyer(1); setDouble(0); setHokmMult(1); state.hokmDoubler = 0; setSpecial('none'); updateDealerUI(); updateSB(); renderHist(); updateStats();
  toast('تم تصفير اللعبة'); saveState();
}

function toast(msg) {
  let t = document.getElementById('toast'); t.textContent = msg;
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500);
}

loadState(); updateLabels(); renderProj(); updateStats();
</script>
</body>
</html>
